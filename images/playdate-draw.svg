<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect width="400" height="240" fill="#000"/>
  <!-- Top toolbar -->
  <rect x="0" y="0" width="400" height="24" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="8" y="16" font-family="monospace" font-size="10" fill="#fff">File</text>
  <text x="40" y="16" font-family="monospace" font-size="10" fill="#fff">Edit</text>
  <text x="72" y="16" font-family="monospace" font-size="10" fill="#fff">View</text>
  <text x="110" y="16" font-family="monospace" font-size="10" fill="#fff">Export</text>
  <text x="320" y="16" font-family="monospace" font-size="9" fill="#666">400x240 1-bit</text>
  <!-- Left toolbar -->
  <rect x="0" y="24" width="36" height="190" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <!-- Pencil tool (selected) -->
  <rect x="4" y="28" width="28" height="22" rx="3" fill="#FFC904"/>
  <line x1="10" y1="44" x2="26" y2="32" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <!-- Eraser tool -->
  <rect x="4" y="54" width="28" height="22" rx="3" fill="#2a2a2a"/>
  <rect x="12" y="58" width="12" height="14" rx="2" fill="#666"/>
  <!-- Line tool -->
  <rect x="4" y="80" width="28" height="22" rx="3" fill="#2a2a2a"/>
  <line x1="10" y1="96" x2="26" y2="84" stroke="#666" stroke-width="2"/>
  <!-- Rect tool -->
  <rect x="4" y="106" width="28" height="22" rx="3" fill="#2a2a2a"/>
  <rect x="10" y="110" width="16" height="14" fill="none" stroke="#666" stroke-width="1.5"/>
  <!-- Fill tool -->
  <rect x="4" y="132" width="28" height="22" rx="3" fill="#2a2a2a"/>
  <path d="M14 148 L22 138 L26 148 Z" fill="#666"/>
  <!-- Dither tool -->
  <rect x="4" y="158" width="28" height="22" rx="3" fill="#2a2a2a"/>
  <circle cx="12" cy="165" r="1.5" fill="#666"/>
  <circle cx="18" cy="169" r="1.5" fill="#666"/>
  <circle cx="24" cy="165" r="1.5" fill="#666"/>
  <circle cx="15" cy="173" r="1.5" fill="#666"/>
  <circle cx="21" cy="173" r="1.5" fill="#666"/>
  <!-- Canvas area (white, Playdate screen) -->
  <rect x="40" y="28" width="260" height="156" fill="#fff" stroke="#FFC904" stroke-width="2"/>
  <!-- Sample pixel art on canvas: small house -->
  <rect x="130" y="110" width="40" height="30" fill="#000"/>
  <polygon points="130,110 150,90 170,110" fill="#000"/>
  <rect x="142" y="120" width="12" height="20" fill="#fff"/>
  <rect x="135" y="115" width="8" height="8" fill="#fff"/>
  <rect x="157" y="115" width="8" height="8" fill="#fff"/>
  <!-- Grid dots hint -->
  <circle cx="80" cy="60" r="0.5" fill="#ccc"/>
  <circle cx="90" cy="60" r="0.5" fill="#ccc"/>
  <circle cx="100" cy="60" r="0.5" fill="#ccc"/>
  <circle cx="80" cy="70" r="0.5" fill="#ccc"/>
  <circle cx="90" cy="70" r="0.5" fill="#ccc"/>
  <circle cx="100" cy="70" r="0.5" fill="#ccc"/>
  <!-- Right panel: Layers -->
  <rect x="304" y="24" width="96" height="190" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="312" y="42" font-family="monospace" font-size="9" font-weight="bold" fill="#FFC904">LAYERS</text>
  <!-- Layer 1 (selected) -->
  <rect x="308" y="48" width="88" height="20" rx="2" fill="#2a2a2a" stroke="#FFC904" stroke-width="1"/>
  <text x="314" y="62" font-family="monospace" font-size="8" fill="#fff">Layer 1</text>
  <circle cx="384" cy="58" r="4" fill="#FFC904"/>
  <!-- Layer 2 -->
  <rect x="308" y="72" width="88" height="20" rx="2" fill="#2a2a2a"/>
  <text x="314" y="86" font-family="monospace" font-size="8" fill="#999">Layer 2</text>
  <circle cx="384" cy="82" r="4" fill="none" stroke="#666" stroke-width="1"/>
  <!-- Layer 3 -->
  <rect x="308" y="96" width="88" height="20" rx="2" fill="#2a2a2a"/>
  <text x="314" y="110" font-family="monospace" font-size="8" fill="#999">Background</text>
  <circle cx="384" cy="106" r="4" fill="none" stroke="#666" stroke-width="1"/>
  <!-- Properties section -->
  <text x="312" y="136" font-family="monospace" font-size="9" font-weight="bold" fill="#FFC904">PROPERTIES</text>
  <text x="314" y="152" font-family="monospace" font-size="8" fill="#999">Brush: 1px</text>
  <text x="314" y="164" font-family="monospace" font-size="8" fill="#999">Color: Black</text>
  <text x="314" y="176" font-family="monospace" font-size="8" fill="#999">Dither: None</text>
  <!-- Color swatches -->
  <rect x="314" y="184" width="16" height="16" fill="#000" stroke="#FFC904" stroke-width="1"/>
  <rect x="334" y="184" width="16" height="16" fill="#fff" stroke="#666" stroke-width="1"/>
  <!-- Bottom timeline -->
  <rect x="0" y="188" width="400" height="28" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="8" y="206" font-family="monospace" font-size="9" font-weight="bold" fill="#FFC904">FRAMES</text>
  <!-- Frame thumbnails -->
  <rect x="60" y="192" width="20" height="20" rx="2" fill="#fff" stroke="#FFC904" stroke-width="1.5"/>
  <rect x="84" y="192" width="20" height="20" rx="2" fill="#2a2a2a" stroke="#666" stroke-width="1"/>
  <rect x="108" y="192" width="20" height="20" rx="2" fill="#2a2a2a" stroke="#666" stroke-width="1"/>
  <text x="134" y="206" font-family="monospace" font-size="16" fill="#666">+</text>
  <!-- Playback controls -->
  <polygon points="340,196 340,208 350,202" fill="#FFC904"/>
  <rect x="356" y="196" width="4" height="12" fill="#666"/>
  <rect x="364" y="196" width="4" height="12" fill="#666"/>
  <!-- Status bar -->
  <rect x="0" y="220" width="400" height="20" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="8" y="234" font-family="monospace" font-size="9" fill="#666">Pencil | (120, 80) | Frame 1/3 | Zoom: 100%</text>
  <text x="310" y="234" font-family="monospace" font-size="9" fill="#FFC904">Playdate Draw</text>
</svg>